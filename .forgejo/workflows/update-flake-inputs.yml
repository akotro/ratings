name: Update flake inputs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 07 * * 6" # At 07:00 on Saturday

jobs:
  update-flake-inputs:
    runs-on: ubuntu-latest
    steps:
      - uses: https://git.akotro.dev/actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure git
        run: |
          echo "https://akotro:${{ secrets.FJ_TOKEN }}@git.akotro.dev" > ~/.git-credentials
          git config --global credential.helper store
          git config --global user.name "forgejo-bot"
          git config --global user.email "forgejo@users.noreply.git"

      - name: Install Lix
        uses: https://github.com/samueldr/lix-gha-installer-action@f5e94192f565f53d84f41a056956dc0d3183b343
        with:
          github_access_token: ${{ secrets.GH_TOKEN }}
          extra_nix_config: |
            substituters = https://cache.nixos.org/?priority=1 https://cache.tithe.stream?priority=2 https://nix-community.cachix.org?priority=10 https://hyprland.cachix.org?priority=11 https://noctalia.cachix.org?priority=12
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= cache.tithe.stream-1:RD/1y82WcSzAO6zsLiF2Q+6iC37BF/5m8D4qtK66O3A= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= hyprland.cachix.org-1:a7pgxzMz7+chwVL3/pzj6jIBMioiJM7ypFP8PwtkuGc= noctalia.cachix.org-1:pCOR47nnMEo5thcxNDtzWpOxNFQsBRglJzxWPp3dkU4=
            keep-env-derivations = true
            keep-outputs = true
            experimental-features = nix-command flakes
            accept-flake-config = true
            access-tokens = github.com=${{ secrets.GH_TOKEN }} git.akotro.dev=${{ secrets.FJ_TOKEN }}

      - name: Update flake inputs
        run: |
          nix flake update --commit-lock-file

      - name: Create PR
        uses: https://git.akotro.dev/actions/create-pr@main
        with:
          token: ${{ secrets.FJ_TOKEN }}
          pr-branch: chore/update-flake
          pr-title: "flake: updates"
          pr-body: "`flake.lock` updates"
          pr-assignee: akotro
          pr-condition-cmd: "git log origin/main..HEAD --oneline"
